<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f59e0b" />
    <title>Chef OS offline</title>
    <style>
      :root {
        color: #0f172a;
        background: #f8fafc;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        border-radius: 28px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.16);
      }

      img {
        width: 64px;
        height: 64px;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #475569;
        font-size: 16px;
        font-weight: 700;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/pwa-icon.svg" alt="" />
      <h1>Chef OS offline</h1>
      <p>Нет сети. Открой приложение снова после первого успешного запуска, чтобы продолжить работу с закешированным экраном смены.</p>
    </main>
  </body>
</html>
